DATASET: 'CustomDataset'
DATA_PATH: '../data/custom'

POINT_CLOUD_RANGE: [-30.0, -20.0, -3.0, 30.0, 20.0, 3.0]

MAP_CLASS_TO_KITTI: {
    'Pedestrian': 'Pedestrian',
    'Cart': 'Car',
    'Pallet': 'Car',
    'Cone': 'Cyclist',
}

DATA_SPLIT: {
    'train': train,
    'test': val
}

INFO_PATH: {
    'train': [robot_infos_train.pkl],
    'test': [robot_infos_val.pkl],
}

POINT_FEATURE_ENCODING: {
    encoding_type: absolute_coordinates_encoding,
    used_feature_list: ['x', 'y', 'z', 'intensity'],
    src_feature_list: ['x', 'y', 'z', 'intensity'],
}

DATA_AUGMENTOR:
    DISABLE_AUG_LIST: ['gt_sampling']
    AUG_CONFIG_LIST:
        - NAME: random_world_flip
          ALONG_AXIS_LIST: ['x', 'y']
        - NAME: random_world_rotation
          WORLD_ROT_ANGLE: [-0.3925, 0.3925]
        - NAME: random_world_scaling
          WORLD_SCALE_RANGE: [0.95, 1.05]

DATA_PROCESSOR:
    - NAME: mask_points_and_boxes_outside_range
      REMOVE_OUTSIDE_BOXES: True
    - NAME: shuffle_points
      SHUFFLE_ENABLED: {'train': True, 'test': False}
    - NAME: transform_points_to_voxels
      VOXEL_SIZE: [0.15, 0.15, 0.2]
      MAX_POINTS_PER_VOXEL: 10
      MAX_NUMBER_OF_VOXELS: {'train': 80000, 'test': 80000}
